name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --passWithNoTests

  build-frontend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vite build --config apps/pos-app/vite.config.ts
      - run: npx vite build --config apps/admin-dashboard/vite.config.ts
      - run: npx vite build --config apps/kitchen-screen/vite.config.ts
      - run: npx vite build --config apps/hub-app/vite.config.ts
      - run: npx vite build --config apps/ordering-app/vite.config.ts
      - run: ls -R dist/apps/ | head -30
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/apps/
          retention-days: 1

  deploy:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/apps/

      - name: Debug artifact contents
        run: ls -R dist/apps/ | head -30

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          config: |
            Host vps
              HostName ${{ secrets.VPS_HOST }}
              User ilia
              StrictHostKeyChecking no

      - name: Ensure remote directories exist
        run: ssh vps 'sudo mkdir -p /var/www/bake-app/{pos-app,admin-dashboard,kitchen-screen,hub-app,ordering-app} && sudo chown -R ilia:ilia /var/www/bake-app'

      - name: Deploy frontend assets
        run: |
          rsync -azP --delete dist/apps/pos-app/ vps:/var/www/bake-app/pos-app/
          rsync -azP --delete dist/apps/admin-dashboard/ vps:/var/www/bake-app/admin-dashboard/
          rsync -azP --delete dist/apps/kitchen-screen/ vps:/var/www/bake-app/kitchen-screen/
          rsync -azP --delete dist/apps/hub-app/ vps:/var/www/bake-app/hub-app/
          rsync -azP --delete dist/apps/ordering-app/ vps:/var/www/bake-app/ordering-app/

      - name: Deploy API
        run: |
          ssh vps << 'EOF'
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /opt/bake-app
            git fetch origin main
            git reset --hard origin/main
            npm ci --omit=dev
            npx nest build apps/api
            pm2 restart bake-api
          EOF

      - name: Health check
        run: |
          sleep 5
          ssh vps 'curl -f http://127.0.0.1:3100/api/health || exit 1'

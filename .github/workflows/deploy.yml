name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --passWithNoTests

  build-frontend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vite build --config apps/pos-app/vite.config.ts
      - run: npx vite build --config apps/admin-dashboard/vite.config.ts
      - run: npx vite build --config apps/kitchen-screen/vite.config.ts
      - run: npx vite build --config apps/hub-app/vite.config.ts
      - run: npx vite build --config apps/ordering-app/vite.config.ts
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/apps/
          retention-days: 1

  deploy:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/apps/

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          config: |
            Host vps
              HostName ${{ secrets.VPS_HOST }}
              User ilia
              StrictHostKeyChecking no

      - name: Ensure remote directories exist
        run: ssh vps 'mkdir -p ~/apps/bake-app-static/{pos-app,admin-dashboard,kitchen-screen,hub-app,ordering-app}'

      - name: Deploy frontend assets
        run: |
          rsync -azP --delete dist/apps/pos-app/ vps:~/apps/bake-app-static/pos-app/
          rsync -azP --delete dist/apps/admin-dashboard/ vps:~/apps/bake-app-static/admin-dashboard/
          rsync -azP --delete dist/apps/kitchen-screen/ vps:~/apps/bake-app-static/kitchen-screen/
          rsync -azP --delete dist/apps/hub-app/ vps:~/apps/bake-app-static/hub-app/
          rsync -azP --delete dist/apps/ordering-app/ vps:~/apps/bake-app-static/ordering-app/

      - name: Deploy API
        run: |
          ssh vps << 'EOF'
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd ~/apps/bake-app
            git fetch origin main
            git reset --hard origin/main
            npm ci --omit=dev
            npx nest build
            pm2 restart bake-api
          EOF

      - name: Health check
        run: |
          sleep 5
          ssh vps 'curl -f http://127.0.0.1:3100/api/health || exit 1'
